<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--navy:#0a2a4f;--blue:#2693ff;--light-blue:#e4eef8;--stroke:rgba(0,0,0,.1);--green:#1a7f3c;--support:#15803d;--oppose:#b91c1c}
body{font-family:'Inter',-apple-system,sans-serif;background:#f0f4f8;color:var(--navy);-webkit-font-smoothing:antialiased;-webkit-text-size-adjust:100%}
.wrap{padding:20px 16px 40px;max-width:540px;margin:0 auto}
.brand-bar{display:flex;align-items:center;gap:10px;margin-bottom:6px}
.brand-name{font-size:2rem;font-weight:700;letter-spacing:-0.05em;color:var(--navy)}
.brand-pill{font-size:0.625rem;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;background:var(--light-blue);color:var(--blue);padding:4px 10px;border-radius:100px}
.sub{font-size:0.9375rem;color:rgba(10,42,79,.5);margin-bottom:24px;line-height:1.5}
.data-badge{display:inline-flex;align-items:center;gap:6px;font-size:0.75rem;color:rgba(10,42,79,.4);background:#fff;border-radius:100px;padding:4px 10px;margin-bottom:20px;border:1px solid var(--stroke)}
.data-dot{width:7px;height:7px;border-radius:50%;background:#34c759;flex-shrink:0}
.data-dot.stale{background:#ff9500}
.io-bar{display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap}
.io-btn{font-family:'Inter',-apple-system,sans-serif;font-size:0.75rem;font-weight:600;color:rgba(10,42,79,.5);background:#fff;border:1px solid var(--stroke);border-radius:100px;padding:6px 14px;cursor:pointer;-webkit-appearance:none;transition:opacity .15s}
.io-btn:active{opacity:.7}
.io-count{font-size:0.75rem;color:rgba(10,42,79,.35);font-weight:500}
.sec-lbl{font-size:0.6875rem;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:rgba(10,42,79,.4);margin:0 4px 8px}
.card{background:#fff;border-radius:20px;overflow:hidden;margin-bottom:16px}
.field{display:flex;align-items:center;padding:0 20px;min-height:62px;border-bottom:1px solid var(--stroke)}
.field:last-child{border-bottom:none}
.field-label{font-size:1.0625rem;font-weight:500;color:var(--navy);flex:1}
.sel-wrap{display:flex;align-items:center;gap:4px}
select{font-family:'Inter',-apple-system,sans-serif;font-size:1.0625rem;color:var(--blue);font-weight:600;background:transparent;border:none;outline:none;text-align:right;-webkit-appearance:none;appearance:none;padding:0;cursor:pointer;max-width:200px}
.chev{font-size:13px;color:rgba(10,42,79,.25)}
.toggle-row{display:flex;align-items:center;padding:16px 20px;min-height:68px;border-bottom:1px solid var(--stroke);gap:14px;cursor:pointer;-webkit-user-select:none;user-select:none}
.toggle-row:last-child{border-bottom:none}
.toggle-row:active{background:#f7faff}
.toggle-info{flex:1;pointer-events:none}
.toggle-name{font-size:1.0625rem;font-weight:600;color:var(--navy)}
.toggle-kw{font-size:0.8125rem;color:rgba(10,42,79,.35);margin-top:3px;line-height:1.4}
.pill{width:56px;height:34px;border-radius:100px;background:#ddd;position:relative;flex-shrink:0;transition:background .22s;pointer-events:none}
.pill.on{background:#34c759}
.pill-thumb{position:absolute;top:3px;left:3px;width:28px;height:28px;border-radius:50%;background:#fff;box-shadow:0 2px 6px rgba(0,0,0,.28);transition:transform .22s cubic-bezier(.4,0,.2,1)}
.pill.on .pill-thumb{transform:translateX(22px)}
.rate-row{display:flex;align-items:center;padding:0 20px;min-height:62px;border-bottom:1px solid var(--stroke);gap:12px}
.rate-row:last-child{border-bottom:none}
.rate-name{flex:1;font-size:1.0625rem;font-weight:500;color:var(--navy)}
.rate-right{display:flex;align-items:center;gap:6px}
.rate-pct{font-size:1.0625rem;color:rgba(10,42,79,.35);font-weight:500}
.run-btn{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;padding:20px;background:var(--navy);color:#fff;border:none;border-radius:20px;font-family:'Inter',-apple-system,sans-serif;font-size:1.125rem;font-weight:700;letter-spacing:-0.01em;cursor:pointer;margin-bottom:20px;-webkit-appearance:none;transition:opacity .15s}
.run-btn:active{opacity:.75}
.results-card{background:#fff;border-radius:20px;overflow:hidden;margin-bottom:16px}
.res-header{padding:18px 20px;border-bottom:1px solid var(--stroke);display:flex;justify-content:space-between;align-items:center;gap:8px;flex-wrap:wrap}
.res-title{font-size:1.0625rem;font-weight:700;color:var(--navy);letter-spacing:-0.02em}
.res-meta{font-size:0.6875rem;color:rgba(10,42,79,.35);font-weight:600;text-transform:uppercase;letter-spacing:0.06em}
.stat-row{display:grid;grid-template-columns:repeat(3,1fr);border-bottom:1px solid var(--stroke)}
.stat{background:var(--light-blue);padding:16px 14px}
.stat+.stat{border-left:1px solid rgba(10,42,79,.08)}
.stat-lbl{font-size:0.625rem;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:rgba(10,42,79,.4);margin-bottom:5px}
.stat-val{font-size:1.375rem;font-weight:700;letter-spacing:-0.04em;color:var(--navy)}
.stat-val.green{color:var(--green)}
.org-row{border-bottom:1px solid var(--stroke)}
.org-row:last-child{border-bottom:none}
.org-summary{padding:16px 20px;cursor:pointer;-webkit-user-select:none;user-select:none}
.org-summary:active{background:#fafcff}
.org-top{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:7px}
.org-name{font-size:1.0625rem;font-weight:700;color:var(--blue);letter-spacing:-0.02em;line-height:1.25;flex:1;text-decoration:none}
.org-name:hover{text-decoration:underline}
.fec-link-icon{font-size:0.75rem;opacity:0.5}
.org-cashback{font-size:1.0625rem;font-weight:700;color:var(--green);white-space:nowrap;letter-spacing:-0.02em}
.org-cashback.zero{color:rgba(10,42,79,.2);font-weight:500}
.org-meta{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.org-states{font-size:0.8125rem;color:rgba(10,42,79,.4);font-weight:600;text-transform:uppercase;letter-spacing:0.04em}
.org-chevron{font-size:12px;color:rgba(10,42,79,.25);margin-left:auto;transition:transform .2s;flex-shrink:0}
.org-row.open .org-chevron{transform:rotate(90deg)}
.org-spend{font-size:0.8125rem;color:rgba(10,42,79,.35);font-weight:500}
.badge{display:inline-block;padding:3px 9px;border-radius:100px;font-size:0.6875rem;font-weight:700;letter-spacing:0.04em;text-transform:uppercase}
.badge-linear{background:#dbeafe;color:#1e40af}
.badge-digital{background:#ede9fe;color:#6d28d9}
.badge-radio{background:#fef3c7;color:#b45309}
.badge-mail{background:#fce7f3;color:#9d174d}
.badge-unclassified{background:#f1f5f9;color:#64748b}
.sup-badge{display:inline-block;padding:2px 8px;border-radius:100px;font-size:0.6875rem;font-weight:700;letter-spacing:0.04em;text-transform:uppercase}
.sup-badge.S{background:#dcfce7;color:var(--support)}
.sup-badge.O{background:#fee2e2;color:var(--oppose)}
.disb-list{display:none;background:#f7fafd;border-top:1px solid var(--stroke);padding:4px 0}
.org-row.open .disb-list{display:block}
.disb-row{padding:14px 20px;border-bottom:1px solid rgba(10,42,79,.06)}
.disb-row:last-child{border-bottom:none}
.disb-fields{display:flex;justify-content:space-between;align-items:flex-start;gap:16px}
.disb-left{flex:1;display:flex;flex-direction:column;gap:5px}
.disb-right{display:flex;flex-direction:column;gap:5px;align-items:flex-end;flex-shrink:0}
.disb-field-label{font-size:0.625rem;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:rgba(10,42,79,.35);margin-bottom:1px}

.classify-btn:active{opacity:.7}
.classify-btn.selected{color:#fff}
.classify-btn[data-bucket="linear"]{border-color:#1e40af;color:#1e40af}.classify-btn[data-bucket="linear"].selected{background:#1e40af;color:#fff}
.classify-btn[data-bucket="digital"]{border-color:#6d28d9;color:#6d28d9}.classify-btn[data-bucket="digital"].selected{background:#6d28d9;color:#fff}
.classify-btn[data-bucket="radio"]{border-color:#b45309;color:#b45309}.classify-btn[data-bucket="radio"].selected{background:#b45309;color:#fff}
.classify-btn[data-bucket="mail"]{border-color:#9d174d;color:#9d174d}.classify-btn[data-bucket="mail"].selected{background:#9d174d;color:#fff}
.footer-note{font-size:0.75rem;color:rgba(10,42,79,.3);padding:12px 20px;line-height:1.5}

.no-data-title{font-size:1rem;font-weight:600;color:var(--navy);margin-bottom:8px}
.no-data-sub{font-size:0.875rem;color:rgba(10,42,79,.5);line-height:1.5}
.no-data-code{font-family:monospace;font-size:0.8125rem;background:#f0f4f8;border-radius:8px;padding:10px 14px;margin-top:12px;text-align:left;color:var(--navy);line-height:1.6}
</style>
</head>

  if (IE_META && IE_META.generated) {
    var d = new Date(IE_META.generated);
    var days = Math.floor((Date.now() - d.getTime()) / 86400000);
    var age = days === 0 ? 'today' : days === 1 ? 'yesterday' : days + 'd ago';
    dot.className = days > 2 ? 'data-dot stale' : 'data-dot';
    text.textContent = count.toLocaleString() + ' orgs \u00B7 updated ' + age;
  } else {
    text.textContent = count.toLocaleString() + ' orgs loaded';
  }
}

// ── TOGGLES ───────────────────────────────────────────────────────────────────
function buildToggles() {
  var el = document.getElementById('toggle-card');
  el.innerHTML = '';
  for (var i = 0; i < MEDIA.length; i++) {
    var m = MEDIA[i];
    var row = document.createElement('div');
    row.className = 'toggle-row';
    row.setAttribute('data-id', m.id);
    row.innerHTML =
      '<div class="toggle-info">' +
        '<div class="toggle-name">' + m.name + '</div>' +
        '<div class="toggle-kw">' + m.kw.slice(0,3).join(', ') + '</div>' +
      '</div>' +
      '<div class="pill' + (active[m.id] ? ' on' : '') + '" id="pill-' + m.id + '">' +
        '<div class="pill-thumb"></div>' +
      '</div>';
    el.appendChild(row);
  }
  el.addEventListener('click', function(e) {
    var row = e.target.closest('.toggle-row');
    if (!row) return;
    var id = row.getAttribute('data-id');
    active[id] = !active[id];
    document.getElementById('pill-' + id).className = 'pill' + (active[id] ? ' on' : '');
    buildRates();
  });
}

function buildRates() {
  var wrap = document.getElementById('rate-wrap');
  var card = document.getElementById('rate-card');
  var anyActive = MEDIA.some(function(m) { return active[m.id]; });
  if (!anyActive) { wrap.style.display = 'none'; return; }
  wrap.style.display = '';
  card.innerHTML = '';
  for (var i = 0; i < MEDIA.length; i++) {
    var m = MEDIA[i];
    if (!active[m.id]) continue;
    var row = document.createElement('div');
    row.className = 'rate-row';
    var inp = document.createElement('input');
    inp.type = 'number';
    inp.setAttribute('inputmode', 'decimal');
    inp.min = 0; inp.max = 20; inp.step = 0.1;
    inp.value = rates[m.id];
    inp.setAttribute('data-id', m.id);
    inp.style.cssText = 'font-family:Inter,-apple-system,sans-serif;font-size:1.1875rem;color:#2693ff;font-weight:700;background:transparent;border:none;outline:none;text-align:right;width:56px;-webkit-appearance:none;appearance:none';
    inp.addEventListener('change', function() {
      rates[this.getAttribute('data-id')] = parseFloat(this.value) || 0;
    });
    row.innerHTML = '<div class="rate-name">' + m.name + '</div><div class="rate-right"></div>';
    row.querySelector('.rate-right').appendChild(inp);
    var pct = document.createElement('span');
    pct.className = 'rate-pct';
    pct.textContent = '%';
    row.querySelector('.rate-right').appendChild(pct);
    card.appendChild(row);
  }
}

buildToggles();
buildRates();
initDataBadge();
initClassifications();

// ── RUN LOOKUP ────────────────────────────────────────────────────────────────
document.getElementById('run-btn').addEventListener('click', function() {
  var state  = document.getElementById('state').value;
  var office = document.getElementById('office').value;
  var floor  = parseFloat(document.getElementById('floor').value) || 0;

  var anyActive = MEDIA.some(function(m) { return active[m.id]; });
  if (!anyActive) { alert('Please select at least one media type.'); return; }

  if (!IE_DATA || typeof IE_DATA !== 'object' || Object.keys(IE_DATA).length === 0) {
    document.getElementById('results').innerHTML =
      '<div class="no-data-card">' +
        '<div class="no-data-title">No data loaded</div>' +
        '<div class="no-data-sub">Run the processing script to generate ie_data.json, then inject it.</div>' +
        '<div class="no-data-code">python3 build_ie_data.py<br>python3 inject_ie_data.py</div>' +
      '</div>';
    return;
  }

  var rows = [];
  for (var orgId in IE_DATA) {
    var org = IE_DATA[orgId];

    // State filter — org must have spend in selected state (or all states)
    if (state && org.states.indexOf(state) === -1) continue;

    // Filter disbursements
    var disbs = (org.disbs || []).filter(function(d) {
      if (state && d.state !== state) return false;
      if (office && d.office !== office) return false;
      var effectiveBucket = getClassification(d.id, d.payee, d.desc) || d.m;
      return active[effectiveBucket];
    });

    var totalMedia = disbs.reduce(function(s, d) { return s + d.a; }, 0);
    if (totalMedia < floor) continue;

    var cashBack = disbs.reduce(function(s, d) {
      var effectiveBucket = getClassification(d.id, d.payee, d.desc) || d.m;
      if (!active[effectiveBucket]) return s;
      return s + d.a * ((rates[effectiveBucket] || 0) / 100);
    }, 0);

    var effectiveDisbs = disbs.map(function(d) {
      return { m: getClassification(d.id, d.payee, d.desc) || d.m, a: d.a };
    });
    var byType = {};
    effectiveDisbs.forEach(function(d) { byType[d.m] = (byType[d.m] || 0) + d.a; });
    var pType = Object.keys(byType).sort(function(a,b) { return byType[b]-byType[a]; })[0] || null;

    rows.push({
      orgId: orgId,
      name: org.name,
      totalMedia: totalMedia,
      cashBack: cashBack,
      pType: pType,
      disbs: disbs,
    });
  }

  rows.sort(function(a,b) { return b.totalMedia - a.totalMedia; });

  var tMedia = rows.reduce(function(s,r) { return s+r.totalMedia; }, 0);
  var tCash  = rows.reduce(function(s,r) { return s+r.cashBack; }, 0);

  var resultsEl = document.getElementById('results');
  if (rows.length === 0) {
    resultsEl.innerHTML = '<div class="error-card">No organizations found' + (state ? ' for ' + state : '') + ' with matched media spend. Try a lower floor or enabling more media types.</div>';
    return;
  }

  var wrap = document.createElement('div');
  wrap.className = 'results-card';
  wrap.innerHTML =
    '<div class="res-header">'
      + '<span class="res-title">' + (state || 'All States') + ' &middot; ' + rows.length + ' org' + (rows.length!==1?'s':'') + '</span>'
      + '<span class="res-meta">FEC &middot; 2025&ndash;26</span>'
    + '</div>'
    + '<div class="stat-row">'
      + '<div class="stat"><div class="stat-lbl">Orgs</div><div class="stat-val">' + rows.length + '</div></div>'
      + '<div class="stat"><div class="stat-lbl">IE Spend</div><div class="stat-val">' + fmtS(tMedia) + '</div></div>'
      + '<div class="stat"><div class="stat-lbl">Cashback</div><div class="stat-val green">' + fmtS(tCash) + '</div></div>'
    + '</div>';

  for (var i = 0; i < rows.length; i++) {
    var r = rows[i];
    var mObj = MEDIA.find(function(m) { return m.id === r.pType; }) || null;

    var orgRow = document.createElement('div');
    orgRow.className = 'org-row';
    orgRow.setAttribute('data-orgid', r.orgId);

    var summary = document.createElement('div');
    summary.className = 'org-summary';
    summary.innerHTML =
      '<div class="org-top">'
        + '<a class="org-name" href="https://www.fec.gov/data/committee/' + r.orgId + '/" target="_blank" rel="noopener" onclick="event.stopPropagation()">' + esc(r.name) + ' <span class="fec-link-icon">&#8599;</span></a>'
        + '<span class="org-cashback' + (r.cashBack>0?'':' zero') + '">' + (r.cashBack>0?fmtN(r.cashBack):'&mdash;') + '</span>'
      + '</div>'
      + '<div class="org-meta">'
        + (mObj ? '<span class="badge '+mObj.badge+'">'+mObj.name+'</span>' : '')
        + '<span class="org-spend">' + fmtN(r.totalMedia) + ' IE spend</span>'
        + '<span class="org-chevron">&#8250;</span>'
      + '</div>';

    var disbList = document.createElement('div');
    disbList.className = 'disb-list';
    disbList.innerHTML = buildDisbList(r.disbs, r.orgId);

    summary.addEventListener('click', (function(row) {
      return function() { row.classList.toggle('open'); };
    })(orgRow));

    orgRow.appendChild(summary);
    orgRow.appendChild(disbList);
    wrap.appendChild(orgRow);
  }

  var fn = document.createElement('div');
  fn.className = 'footer-note';
  fn.innerHTML = 'FEC IE bulk data &middot; 24/48-hour reports &middot; ' + (IE_META ? IE_META.generated.slice(0,10) : 'Unknown date');
  wrap.appendChild(fn);

  resultsEl.innerHTML = '';
  resultsEl.appendChild(wrap);
});

// ── DISBURSEMENT BREAKDOWN ────────────────────────────────────────────────────
function buildDisbList(disbs, orgId) {
  if (!disbs || disbs.length === 0) {
    return '<div style="padding:14px 20px;font-size:0.875rem;color:rgba(10,42,79,.4)">No matched disbursements.</div>';
  }
  var sorted = disbs.slice().sort(function(a,b) { return b.a - a.a; });
  return sorted.map(function(d) {
    var effectiveBucket = getClassification(d.id, d.payee, d.desc) || d.m;
    var mObj = MEDIA.find(function(m) { return m.id === effectiveBucket; }) || null;
    var supOppLabel = d.sup_opp === 'S'
      ? '<span class="sup-badge S">Support</span>'
      : '<span class="sup-badge O">Oppose</span>';
    var classifyBar = '';
    if (d.m === 'unclassified') {
      var btns = ['linear','digital','radio','mail'].map(function(b) {
        var mB = MEDIA.find(function(m) { return m.id === b; });
        var sel = effectiveBucket === b ? ' selected' : '';
        return '<button class="classify-btn'+sel+'" data-bucket="'+b+'" data-tid="'+esc(d.id)+'" data-orgid="'+esc(orgId)+'">'+mB.name+'</button>';
      }).join('');
      classifyBar = '<div class="classify-bar"><span class="classify-lbl">Classify</span>'+btns+'</div>';
    }
    return '<div class="disb-row" data-tid="'+esc(d.id)+'">'
      + '<div class="disb-fields">'
        + '<div class="disb-left">'
          + '<div>'
            + '<div class="disb-field-label">Purpose</div>'
            + '<div class="disb-field-value">' + esc(d.desc || '—') + '</div>'
          + '</div>'
          + '<div>'
            + '<div class="disb-field-label">Payee</div>'
            + '<div class="disb-field-value">' + esc(d.payee || '—') + '</div>'
          + '</div>'
          + '<div>'
            + '<div class="disb-field-label">Candidate</div>'
            + '<div class="disb-field-value">' + esc(capWords(d.cand)) + ' ' + supOppLabel + '</div>'
          + '</div>'
          + (mObj ? '<span class="disb-type badge '+mObj.badge+'" id="badge-'+esc(d.id)+'">'+mObj.name+'</span>' : '')
        + '</div>'
        + '<div class="disb-right">'
          + '<div style="text-align:right">'
            + '<div class="disb-field-label">Amount</div>'
            + '<div class="disb-field-value amt">' + fmtN(d.a) + '</div>'
          + '</div>'
          + (d.t ? '<div style="text-align:right">'
            + '<div class="disb-field-label">Date</div>'
            + '<div class="disb-field-value">' + fmtDate(d.t) + '</div>'
          + '</div>' : '')
          + '<div style="text-align:right">'
            + '<div class="disb-field-label">Office</div>'
            + '<div class="disb-field-value">' + esc(d.office + (d.district?' '+d.district:'')) + '</div>'
          + '</div>'
        + '</div>'
      + '</div>'
      + classifyBar
    + '</div>';
  }).join('');
}

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── UTILS ─────────────────────────────────────────────────────────────────────
function fmtN(n) { return '$' + Math.round(n).toLocaleString(); }
function fmtS(n) {
  if (n >= 1000000) return '$' + (n/1000000).toFixed(1) + 'M';
  if (n >= 1000) return '$' + Math.round(n/1000) + 'K';
  return '$' + Math.round(n);
}
function fmtDate(s) {
  if (!s) return '';
  var p = s.split('-');
  return p.length === 3 ? p[1]+'/'+p[2].slice(0,2)+'/'+p[0].slice(2) : s;
}
function capWords(s) {
  return (s||'').toLowerCase().replace(/\b\w/g, function(c) { return c.toUpperCase(); });
}

// ── CLASSIFICATION SYSTEM ─────────────────────────────────────────────────────
var CLASSIF_KEY = 'ie_classifications_v1';
var SIG_KEY     = 'ie_signatures_v1';
var classifications = {};
var signatures      = {};

function initClassifications() {
  try {
    var stored = localStorage.getItem(CLASSIF_KEY);
    if (stored) { var p = JSON.parse(stored); classifications = (p && typeof p === 'object') ? p : {}; }
  } catch(e) { classifications = {}; }
  try {
    var storedSig = localStorage.getItem(SIG_KEY);
    if (storedSig) { var ps = JSON.parse(storedSig); signatures = (ps && typeof ps === 'object') ? ps : {}; }
  } catch(e) { signatures = {}; }
  updateIOBar();
}

function saveClassifications() {
  try { localStorage.setItem(CLASSIF_KEY, JSON.stringify(classifications)); } catch(e) {}
  try { localStorage.setItem(SIG_KEY, JSON.stringify(signatures)); } catch(e) {}
  updateIOBar();
}

function makeSignature(payee, desc) {
  var v = (payee || '').toLowerCase().replace(/\s+/g, ' ').trim();
  var d = (desc || '').toLowerCase().replace(/\s+/g, ' ').trim();
  return v + '|' + d;
}

function getClassification(tid, payee, desc) {
  if (!tid) return null;
  if (classifications[tid]) return classifications[tid];
  var sig = makeSignature(payee, desc);
  return sig ? (signatures[sig] || null) : null;
}

function setClassification(tid, payee, desc, bucket) {
  if (!tid) return;
  var sig = makeSignature(payee, desc);
  if (bucket) {
    classifications[tid] = bucket;
    if (sig) signatures[sig] = bucket;
  } else {
    delete classifications[tid];
    if (sig) delete signatures[sig];
  }
  saveClassifications();
}

function updateIOBar() {
  var bar   = document.getElementById('io-bar');
  var count = document.getElementById('io-count');
  if (!classifications || typeof classifications !== 'object') classifications = {};
  if (!signatures || typeof signatures !== 'object') signatures = {};
  var nT = Object.keys(classifications).length;
  var nS = Object.keys(signatures).length;
  if (nT === 0 && nS === 0) { bar.style.display = 'none'; return; }
  bar.style.display = 'flex';
  count.textContent = nT + ' classified, ' + nS + ' pattern' + (nS !== 1 ? 's' : '') + ' saved';
}

document.getElementById('export-btn').addEventListener('click', function() {
  var exportData = { classifications: classifications, signatures: signatures };
  var blob = new Blob([JSON.stringify(exportData, null, 2)], {type:'application/json'});
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'ie_classifications.json';
  a.click();
  URL.revokeObjectURL(a.href);
});

document.getElementById('import-btn').addEventListener('click', function() {
  document.getElementById('import-input').click();
});
document.getElementById('import-input').addEventListener('change', function() {
  var file = this.files[0];
  if (!file) return;
  var reader = new FileReader();
  reader.onload = function(e) {
    try {
      var imported = JSON.parse(e.target.result);
      if (typeof imported === 'object' && imported !== null) {
        var importedClass = imported.classifications || imported;
        var importedSigs  = imported.signatures || {};
        Object.assign(classifications, importedClass);
        Object.assign(signatures, importedSigs);
        saveClassifications();
        var nC = Object.keys(importedClass).length;
        var nS = Object.keys(importedSigs).length;
        alert('Imported ' + nC + ' classifications, ' + nS + ' patterns.');
        document.getElementById('run-btn').click();
      }
    } catch(err) { alert('Invalid JSON file.'); }
  };
  reader.readAsText(file);
  this.value = '';
});

// Event delegation — classify buttons
document.getElementById('results').addEventListener('click', function(e) {
  var btn = e.target.closest('.classify-btn');
  if (!btn) return;

  var tid    = btn.getAttribute('data-tid');
  var bucket = btn.getAttribute('data-bucket');
  var orgId  = btn.getAttribute('data-orgid');

  var disbRow = btn.closest('.disb-row');
  var descEls = disbRow ? disbRow.querySelectorAll('.disb-field-value') : [];
  var dDesc   = descEls.length > 0 ? descEls[0].textContent : '';
  var dPayee  = descEls.length > 1 ? descEls[1].textContent : '';

  if (getClassification(tid, dPayee, dDesc) === bucket) {
    setClassification(tid, dPayee, dDesc, null);
    bucket = 'unclassified';
  } else {
    setClassification(tid, dPayee, dDesc, bucket);
  }

  var classBar = btn.closest('.classify-bar');
  classBar.querySelectorAll('.classify-btn').forEach(function(b) {
    b.classList.toggle('selected', b.getAttribute('data-bucket') === bucket && bucket !== 'unclassified');
  });

  var badgeEl = document.getElementById('badge-' + tid);
  if (badgeEl) {
    var mObj = MEDIA.find(function(m) { return m.id === bucket; }) || MEDIA.find(function(m) { return m.id === 'unclassified'; });
    if (mObj) {
      badgeEl.className = 'disb-type badge ' + mObj.badge;
      badgeEl.textContent = mObj.name;
    }
  }

  // Re-render open disb lists and recalc
  document.querySelectorAll('.org-row.open').forEach(function(row) {
    var oid = row.getAttribute('data-orgid');
    if (!oid || !IE_DATA || !IE_DATA[oid]) return;
    var dl = row.querySelector('.disb-list');
    if (dl) dl.innerHTML = buildDisbList(IE_DATA[oid].disbs, oid);
  });

  recalcCashback(orgId);
});

function recalcCashback(orgId) {
  if (!IE_DATA || !IE_DATA[orgId]) return;
  var org = IE_DATA[orgId];
  var state  = document.getElementById('state').value;
  var office = document.getElementById('office').value;

  var disbs = (org.disbs || []).filter(function(d) {
    if (state && d.state !== state) return false;
    if (office && d.office !== office) return false;
    var effectiveBucket = getClassification(d.id, d.payee, d.desc) || d.m;
    return active[effectiveBucket];
  });

  var cashBack = disbs.reduce(function(s, d) {
    var effectiveBucket = getClassification(d.id, d.payee, d.desc) || d.m;
    return s + d.a * ((rates[effectiveBucket] || 0) / 100);
  }, 0);

  var orgRow = document.querySelector('.org-row[data-orgid="' + orgId + '"]');
  if (!orgRow) return;
  var cbEl = orgRow.querySelector('.org-cashback');
  if (!cbEl) return;
  cbEl.textContent = cashBack > 0 ? fmtN(cashBack) : '\u2014';
  cbEl.className = 'org-cashback' + (cashBack > 0 ? '' : ' zero');

  recalcAggregate();
}

function recalcAggregate() {
  var totalCash = 0;
  document.querySelectorAll('.org-row').forEach(function(row) {
    var cbEl = row.querySelector('.org-cashback');
    if (!cbEl) return;
    var txt = cbEl.textContent.replace(/[$,]/g, '');
    var val = parseFloat(txt);
    if (!isNaN(val)) totalCash += val;
  });
  var statVals = document.querySelectorAll('.stat-val.green');
  statVals.forEach(function(el) { el.textContent = fmtS(totalCash); });
}
</script>
